repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-xml
  - id: check-json
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v22.1.5
  hooks:
  - id: clang-format
    types_or: [c++]
    args: ['-i']
